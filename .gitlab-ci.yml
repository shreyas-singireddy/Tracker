image: python:3.12-slim

stages:
  - test

run-diagnostics-and-tests:
  stage: test

  before_script:
    - python --version
    - pip --version
    - python -m pip install --upgrade pip
    - |
      if [ -f requirements.txt ]; then
        pip install -r requirements.txt
      else
        echo "No requirements.txt found"
      fi

  script:
    - echo "===== Diagnostics ====="
    - pwd
    - ls -la

    - echo "===== Python Syntax Check ====="
    - python -m compileall .

    - echo "===== Running Tests ====="
    - |
      if [ -d tests ]; then
        pytest -v
      else
        echo "No tests folder found"
      fi

  artifacts:
    when: always
    expire_in: 7 days