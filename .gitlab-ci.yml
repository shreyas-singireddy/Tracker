stages:
  - test

run-diagnostics-and-tests:
  stage: test

  before_script:
    - python --version
    - pip --version
    - pip install --upgrade pip
    - |
      if exist requirements.txt (
        pip install -r requirements.txt
      )

  script:
    - echo "===== Diagnostics ====="
    - echo %CD%
    - dir

    - echo "===== Python Syntax Check ====="
    - python -m compileall .

    - echo "===== Running Tests ====="
    - |
      if exist tests (
        pytest -v
      ) else (
        echo "No tests folder found"
      )

  artifacts:
    when: always
    expire_in: 7 days