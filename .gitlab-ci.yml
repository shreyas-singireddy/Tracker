stages:
  - test

run-diagnostics-and-tests:
  stage: test
  image: python:3.12-slim

  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -r requirements.txt

  script:
    - echo "Running diagnostics..."
    - python -m compileall .
    
    - echo "Running tests..."
    - pytest -v

  artifacts:
    when: always
    reports:
      junit: test-results.xml
    paths:
      - pytest-report.html

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'