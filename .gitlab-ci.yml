image: python:3.12-slim

stages:
  - format
  - lint
  - type_check
  - test
  - coverage
  - security
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip

.default_before_script: &default_before_script
  before_script:
    - python --version
    - pip --version
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install ruff mypy flake8 pylint vulture bandit pytest pytest-cov

format:
  stage: format
  <<: *default_before_script
  script:
    - ruff format --check .
  only:
    - merge_requests
    - main
    - master

lint-ruff:
  stage: lint
  <<: *default_before_script
  script:
    - ruff check .
  only:
    - merge_requests
    - main
    - master

lint-flake8:
  stage: lint
  <<: *default_before_script
  script:
    - flake8 app/
  only:
    - merge_requests
    - main
    - master

lint-pylint:
  stage: lint
  <<: *default_before_script
  script:
    - pylint app/ || true
  allow_failure: true
  only:
    - merge_requests
    - main
    - master

type-check:
  stage: type_check
  <<: *default_before_script
  script:
    - mypy app/ --ignore-missing-imports
  only:
    - merge_requests
    - main
    - master

test:
  stage: test
  <<: *default_before_script
  script:
    - echo "===== Diagnostics ====="
    - pwd
    - Get-ChildItem
    - echo "===== Python Syntax Check ====="
    - python -m compileall .
    - echo "===== Running Tests ====="
    - pytest tests/ -v --tb=short
  coverage: '/TOTAL.*\s+(\d+%)/'
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - test_fitos_*.db

coverage:
  stage: coverage
  <<: *default_before_script
  script:
    - pytest tests/ --cov=app --cov-report=term-missing --cov-report=xml --cov-report=html
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - htmlcov/
  coverage: '/TOTAL.*\s+(\d+%)/'
  only:
    - merge_requests
    - main
    - master

security-bandit:
  stage: security
  <<: *default_before_script
  script:
    - bandit -r app/ -s B101,B110,B311,B403,B404,B603,B608
  only:
    - merge_requests
    - main
    - master

security-vulture:
  stage: security
  <<: *default_before_script
  script:
    - vulture app/ main.py run_app.py run_tests.py scripts/ --exclude ".venv,tests,__pycache__" --min-confidence 80
  only:
    - merge_requests
    - main
    - master

build-docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t fitos:latest .
  only:
    - main
    - master
