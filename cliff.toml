[changelog]
header = "# Changelog\n\nAll notable changes to FitOS are documented in this file.\n\n"
body = ""
footer = "\n<!-- generated by git-cliff -->\n"
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_processors = [
    { pattern = "\\[(.*?)\\]", replace = "" },
    { pattern = "\\(#(\\d+)\\)", replace = "" },
]

[git.parse_angular]
use_chore_as_feat = false

[gitlink]
remote = "origin"
repository = "shreyas_singireddy/tracker"

[github]
repository = ""

[gitlab]
repository = "shreyas_singireddy/tracker"

[bump]
features = true
breaking = true

[CHANGELOG]
headline = "# Changelog"
