# FitOS Gitleaks Configuration
# Extends default rules with project-specific allowlists

[allowlist]
description = "FitOS allowlist for known safe patterns"
paths = [
    ".venv/",
    "build/",
    "node_modules/",
    "__pycache__/",
    ".git/",
    "htmlcov/",
    ".pytest_cache/",
    ".mypy_cache/",
    ".ruff_cache/",
    ".cache/",
]
